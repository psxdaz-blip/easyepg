# workers/playlist-router/wrangler.toml
name = "playlist-router"
main = "index.ts"
compatibility_date = "2025-12-01"

# Routes — all user subdomains
routes = [
  { pattern = "*.easyepg.tv/playlist.m3u", zone_id = "${CF_ZONE_ID}" },
  { pattern = "*.easyepg.tv/_version", zone_id = "${CF_ZONE_ID}" },
]

# D1 binding
[[d1_databases]]
binding = "DB"
database_name = "easyepg-db"
database_id = ""

# Environment variables
[vars]
ENVIRONMENT = "production"
