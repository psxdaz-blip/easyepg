# workers/playlist-router/wrangler.toml
name = "playlist-router"
main = "index.ts"
compatibility_date = "2025-12-01"
workers_dev = true

# Routes — set via Cloudflare API after deploy (wrangler.toml doesn't support env vars in routes)

# D1 binding
[[d1_databases]]
binding = "DB"
database_name = "easyepg-db"
database_id = "01be135c-7053-4076-a593-f8a15eb725f1"

# Environment variables
[vars]
ENVIRONMENT = "production"
